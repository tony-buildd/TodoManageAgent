services:
  web:
    start: cd web && PORT=3000 npx next dev --port 3000
    stop: lsof -ti :3000 | xargs kill
    healthcheck: curl -sf http://localhost:3000
    port: 3000
    depends_on: []

commands:
  test: cd agent && npx vitest run
  typecheck: cd agent && npx tsc --noEmit
  web-typecheck: cd web && npx tsc --noEmit
  web-build: cd web && npx next build
